<!DOCTYPE html>
<html>
<head>
    <title>Apex Discharge Summary UI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f6f9; }
        h1 { color: #0d6efd; }
        select, button { padding: 12px 20px; font-size: 16px; margin: 10px; }
        button { background: #0d6efd; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0b5ed7; }
        #result { margin-top: 30px; background: #fff; padding: 25px; border: 1px solid #ccc; border-radius: 8px; white-space: pre-wrap; font-family: monospace; max-height: 70vh; overflow: auto; }
    </style>
</head>
<body>
    <h1>🏥 Apex Tertiary Care Hospital & Research Institute</h1>
    <h2>Patient Discharge Summary (Form DS-2025)</h2>
    <p><strong>Select Patient</strong> (10,000 records available):</p>

    <select id="patientSelect" style="width: 550px;">
        <option value="">-- Choose a Patient --</option>
    </select>

    <button onclick="loadPatientsAndShow()">🔄 Load Patient List</button>
    <button onclick="loadDischarge()">📄 Load Full JSON + AI Fields</button>

    <div id="result"></div>

    <script>
        let patients = [];

        async function loadPatientsAndShow() {
            const res = await fetch('/patients');
            patients = await res.json();
            const select = document.getElementById("patientSelect");
            select.innerHTML = '<option value="">-- Choose a Patient --</option>';
            patients.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.discharge_id;
                opt.textContent = `${p.name} (${p.mrn}) — ${p.admission} to ${p.discharge}`;
                select.appendChild(opt);
            });
        }

        async function loadDischarge() {
            const id = document.getElementById("patientSelect").value;
            if (!id) return alert("Please select a patient first");
            
            document.getElementById("result").innerHTML = "<p><strong>Loading full discharge summary...</strong></p>";
            
            const res = await fetch(`/discharge/${id}`);
            const data = await res.json();
            
            document.getElementById("result").textContent = JSON.stringify(data, null, 2);
        }

        // Auto-load patient list when page opens
        window.onload = loadPatientsAndShow;
    </script>
</body>
</html>
